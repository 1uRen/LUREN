<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script>window.__APP_VERSION__ = 'v0.1.30';</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="小手机聊天">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <link rel="manifest" href="./manifest.webmanifest" type="application/manifest+json">
    <link rel="icon" href="./pwa-icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="./pwa-icon-192.png">
    <meta name="theme-color" content="#eceef2">
    <link rel="stylesheet" href="./viewport.css?v=0.1.56">
    <script src="./device-runtime.js?v=0.1.54"></script>
    <link rel="stylesheet" href="./status-bar.css?v=0.1.58">
    <link rel="stylesheet" href="./home.css?v=0.1.99">
    <link rel="stylesheet" href="./chat-base.css?v=0.1.53">
    <link rel="stylesheet" href="./chat-components.css?v=0.1.34">
    <link rel="stylesheet" href="./chat-search.css?v=0.1.22">
    <link rel="stylesheet" href="./chat-theme.css?v=0.1.34">
    <link rel="stylesheet" href="./decorate.css?v=0.1.51">
    <title>小手机聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .home-indicator {
            position: absolute;
            bottom: calc(10px + var(--safe-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: rgba(0, 0, 0, 0.22);
            border-radius: 2.5px;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body class="mode-home">
    <div class="iphone-container">
        <div class="home-screen">
            <div class="home-scroll">
                <section class="home-forum-widget glass-panel">
                    <div class="home-forum-topbar">
                        <div class="home-forum-time" id="forumTime">--:--</div>
                        <div class="home-forum-search">
                            <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/System/search-line.svg" alt="">
                            <span>搜索</span>
                        </div>
                        <button type="button" class="home-forum-more" aria-label="更多">⋯</button>
                    </div>
                    <div class="home-forum-gallery">
                        <div class="home-forum-col-left">
                            <div class="home-forum-img-slot home-forum-main-img" onclick="openHomeImageModal(0)">
                                <img id="forumImage0" src="./assets/home/forum-default-1.png" alt="">
                            </div>
                            <div class="home-forum-title-wrap" id="forumWidgetTitleWrap">
                                <div class="home-forum-title-display" id="forumWidgetTitleDisplay">输入太多会被隐藏喔ヾ(•ω•`)o</div>
                                <div class="home-forum-title-input" id="forumWidgetTitle" contenteditable="true" spellcheck="false" data-placeholder="点击编辑标题" role="textbox" aria-label="小组件标题"></div>
                            </div>
                            <div class="home-forum-author">
                                <div class="home-forum-author-left">
                                    <button type="button" class="home-forum-author-avatar is-empty" id="forumAuthorAvatarBtn" onclick="openHomeAvatarModal()" aria-label="更换头像">
                                        <img id="forumAuthorAvatar" src="" alt="">
                                    </button>
                                    <div class="home-forum-author-meta">
                                        <div class="home-forum-author-name-wrap" id="forumAuthorNameWrap">
                                            <div class="home-forum-author-name-display" id="forumAuthorNameDisplay">NAME</div>
                                            <div class="home-forum-author-name-input" id="forumAuthorName" contenteditable="true" spellcheck="false" data-placeholder="点击编辑名称" role="textbox" aria-label="作者名称"></div>
                                        </div>
                                        <div class="home-forum-author-fans" id="forumAuthorFansDisplay">1.0万粉丝</div>
                                    </div>
                                </div>
                                <button type="button" class="home-forum-follow-btn" id="forumFollowBtn">关注</button>
                            </div>
                            <div class="home-forum-foot">
                                <div class="home-forum-reactions">
                                    <button type="button" class="home-forum-reaction is-like" id="forumLikeBtn" aria-label="喜欢">
                                        <span class="home-forum-reaction-icon is-heart" aria-hidden="true"></span>
                                        <span>喜欢</span>
                                    </button>
                                    <button type="button" class="home-forum-reaction is-dislike" id="forumDislikeBtn" aria-label="不喜欢">
                                        <span class="home-forum-reaction-icon is-broken-heart" aria-hidden="true"></span>
                                        <span>不喜欢</span>
                                    </button>
                                    <span class="home-forum-reaction is-share" aria-hidden="true">
                                        <span class="home-forum-reaction-icon is-share" aria-hidden="true"></span>
                                        <span>分享</span>
                                    </span>
                                </div>
                                <div class="home-forum-comments">
                                    <button type="button" class="home-forum-comment-avatar is-empty" id="forumCommentAvatarBtn" onclick="openHomeCommentAvatarModal()" aria-label="更换评论头像">
                                        <img id="forumCommentAvatar" src="" alt="">
                                    </button>
                                    <div class="home-forum-comment-compose">
                                        <div class="home-forum-comment-draft" id="forumCommentDraft" contenteditable="true" spellcheck="false" data-placeholder="填写评论" role="textbox" aria-label="填写评论"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="home-forum-img-slot home-forum-side-small" onclick="openHomeImageModal(1)">
                            <img id="forumImage1" src="./assets/home/forum-default-2.png" alt="">
                        </div>
                        <div class="home-forum-img-slot home-forum-side-tall" onclick="openHomeImageModal(2)">
                            <img id="forumImage2" src="./assets/home/forum-default-3.png" alt="">
                        </div>
                    </div>
                </section>

                <section class="home-apps-section">
                    <div class="home-apps-grid">
                        <div class="home-app-icon" onclick="handleHomeAppClick('CHAT')">
                            <div class="home-app-icon-surface">
                                <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Communication/chat-3-line.svg" alt="">
                            </div>
                            <span class="home-app-name">CHAT</span>
                        </div>
                        <div class="home-app-icon" onclick="handleHomeAppClick('世界书')">
                            <div class="home-app-icon-surface">
                                <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Document/book-2-line.svg" alt="">
                            </div>
                            <span class="home-app-name">世界书</span>
                        </div>
                        <div class="home-app-icon" onclick="handleHomeAppClick('美化')">
                            <div class="home-app-icon-surface">
                                <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Design/brush-ai-line.svg" alt="">
                            </div>
                            <span class="home-app-name">美化</span>
                        </div>
                        <div class="home-app-icon" onclick="handleHomeAppClick('设置')">
                            <div class="home-app-icon-surface">
                                <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/System/settings-3-line.svg" alt="">
                            </div>
                            <span class="home-app-name">设置</span>
                        </div>
                        <div class="home-app-icon" onclick="handleHomeAppClick('购物')">
                            <div class="home-app-icon-surface">
                                <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Finance/shopping-bag-line.svg" alt="">
                            </div>
                            <span class="home-app-name">购物</span>
                        </div>
                        <div class="home-app-icon" onclick="handleHomeAppClick('打工')">
                            <div class="home-app-icon-surface">
                                <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Business/briefcase-line.svg" alt="">
                            </div>
                            <span class="home-app-name">打工</span>
                        </div>
                        <div class="home-app-icon" onclick="handleHomeAppClick('论坛')">
                            <div class="home-app-icon-surface">
                                <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/Communication/discuss-line.svg" alt="">
                            </div>
                            <span class="home-app-name">论坛</span>
                        </div>
                        <div class="home-app-icon is-placeholder" onclick="handleHomeAppClick('占位应用')">
                            <div class="home-app-icon-surface">
                                <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/System/add-line.svg" alt="">
                            </div>
                            <span class="home-app-name">占位</span>
                        </div>
                    </div>
                </section>
            </div>

            <div class="home-dock-wrap">
                <div class="home-dock glass-panel">
                    <div class="home-dock-icon is-placeholder" onclick="handleHomeAppClick('Dock 1')">
                        <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/System/apps-line.svg" alt="">
                    </div>
                    <div class="home-dock-icon is-placeholder" onclick="handleHomeAppClick('Dock 2')">
                        <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/System/apps-line.svg" alt="">
                    </div>
                    <div class="home-dock-icon is-placeholder" onclick="handleHomeAppClick('Dock 3')">
                        <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/System/apps-line.svg" alt="">
                    </div>
                    <div class="home-dock-icon is-placeholder" onclick="handleHomeAppClick('Dock 4')">
                        <img src="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/icons/System/apps-line.svg" alt="">
                    </div>
                </div>
            </div>

            <div class="home-page-dots" aria-hidden="true">
                <span></span><span></span>
            </div>

            <div class="home-indicator"></div>
        </div>
    </div>

    <div class="home-modal" id="homeUploadModal">
        <div class="home-modal-content">
            <div class="home-modal-title">更换 Widget 图片</div>
            <div class="home-modal-sub" id="homeModalSub">正在更换图片</div>
            <button type="button" class="home-modal-btn home-modal-btn-primary" onclick="uploadHomeFromFile()">选择本地图片</button>
            <button type="button" class="home-modal-btn home-modal-btn-secondary" onclick="toggleHomeUrlInput()">输入图片链接</button>
            <div class="home-url-input-wrap" id="homeUrlInputWrap">
                <input type="text" class="home-url-input" id="homeUrlInput" placeholder="请输入图片 URL">
                <button type="button" class="home-modal-btn home-modal-btn-primary" onclick="uploadHomeFromUrl()">确认</button>
            </div>
            <button type="button" class="home-modal-btn home-modal-btn-secondary" onclick="restoreDefaultForumImage()">恢复默认</button>
            <div class="home-modal-close" onclick="closeHomeModal()">取消</div>
        </div>
    </div>

    <input type="file" id="homeFileInput" accept="image/*">
    <script src="storage.js?v=0.1.61"></script>
    <script src="status-bar.js?v=0.1.57"></script>
    <script src="home.js?v=0.1.75"></script>
    <script src="api.js?v=0.1.22"></script>
    <script src="chat-ai.js?v=0.1.22"></script>
    <script src="chat-state.js?v=0.1.22"></script>
    <script src="chat-wallet-pay.js?v=0.1.22"></script>
    <script src="chat-utils.js?v=0.1.35"></script>
    <script src="chat-stickers.js?v=0.1.22"></script>
    <script src="chat-messages.js?v=0.1.22"></script>
    <script src="chat-ai-send.js?v=0.1.22"></script>
    <script src="chat-contacts.js?v=0.1.22"></script>
    <script src="chat-friends.js?v=0.1.33"></script>
    <script src="chat-profile.js?v=0.1.22"></script>
    <script src="chat-chat-list.js?v=0.1.22"></script>
    <script src="chat-plus.js?v=0.1.23"></script>
    <script src="chat-sidebar.js?v=0.1.22"></script>
    <script src="chat-settings.js?v=0.1.22"></script>
    <script src="chat-core.js?v=0.1.54"></script>
    <script src="chat-render-sidebar.js?v=0.1.47"></script>
    <script src="chat-render-contacts.js?v=0.1.22"></script>
    <script src="chat-render-pay.js?v=0.1.22"></script>
    <script src="chat-render-chat.js?v=0.1.53"></script>
    <script src="chat-render-profile.js?v=0.1.22"></script>
    <script src="chat-render-modals.js?v=0.1.33"></script>
    <script src="chat-render-search.js?v=0.1.52"></script>
    <script src="chat-channels.js?v=0.1.23"></script>
    <script src="chat-render-channels.js?v=0.1.25"></script>
    <script src="chat-render-core.js?v=0.1.52"></script>
    <script src="chat-search.js?v=0.1.22"></script>
    <script src="chat-forward.js?v=0.1.22"></script>
    <script src="chat-selection.js?v=0.1.22"></script>
    <script src="chat-wallet.js?v=0.1.23"></script>
    <script src="chat-render-wallet.js?v=0.1.23"></script>
    <script src="chat.js?v=0.1.22"></script>
    <script src="setting.js?v=0.1.54"></script>
    <script src="decorate.js?v=0.1.54"></script>

    <script>
        if ('serviceWorker' in navigator) {
            const SW_URL = './service-worker.js?v=' + encodeURIComponent(window.__APP_VERSION__ || 'dev');

            navigator.serviceWorker.register(SW_URL, { scope: './' }).catch(function (error) {
                console.warn('Service Worker 注册失败:', error);
            });
        }

        if (typeof applyDisplayMode === 'function') {
            applyDisplayMode();
        }
    </script>
</body>
</html>
